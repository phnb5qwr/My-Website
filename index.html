<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sound of Planes</title>
  <style>
    body {
      background-color: black;
      color: rgba(130, 140, 243, 0.801);
      font-family: 'Times New Roman', serif;
      margin: 0;
      padding: 0;

      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;   /* ← 中央寄せに戻す */
      align-items: center;
      text-align: center;
      max-width: 100%;   /* ← 正しい位置はここ */
    }

    h1 {
      font-size: 1.6em;          /* ← 控えめで上品 */
      margin-bottom: 0.2em;
      font-weight: normal;
    }

    h2 {
      font-size: 1.1em;          /* ← こちらも控えめ */
      font-style: italic;
      margin-top: 0.2em;
      margin-bottom: 2.5em;      /* ← 呼吸を深く */
      font-weight: normal;
    }

    a {
      padding: 10px 20px;
      background-color: #222;
      color: rgba(130, 140, 243, 0.801);
      text-decoration: none;
      font-weight: normal;       /* ← 静かに */
      border-radius: 5px;
      transition: background-color 0.3s;
    }

    a:hover {
      background-color: #444;
    }


    @media screen and (max-width: 600px) {
  body {
    padding: 20px;
  }

  h1 {
    font-size: 2em;     /* ← スマホで大きく見える */
  }

  h2 {
    font-size: 1.4em;   /* ← 呼吸が深くなる */
    margin-bottom: 2em;
  }

  a {
    font-size: 1.2em;   /* ← ボタンが小さくならない */
    padding: 12px 24px;
  }
}


  </style>
</head>
<body>

  <h1>Sound of Planes<sup>®</sup></h1>
  <h2>A gateway to the realm of void</h2>

  <a href="void.html">Enter</a>

</body>
</html>
